<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b10"/>
      <stop offset="0.45" stop-color="#111722"/>
      <stop offset="1" stop-color="#090d12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a222f"/>
      <stop offset="1" stop-color="#0d121a"/>
    </linearGradient>
    <linearGradient id="exotic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8b15b"/>
      <stop offset="0.55" stop-color="#a77d28"/>
      <stop offset="1" stop-color="#4a3717"/>
    </linearGradient>
    <linearGradient id="weapon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b4c5c"/>
      <stop offset="0.55" stop-color="#d7b94f"/>
      <stop offset="1" stop-color="#1d2532"/>
    </linearGradient>
    <linearGradient id="weapon2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#472a62"/>
      <stop offset="0.5" stop-color="#5fbec2"/>
      <stop offset="1" stop-color="#1d1424"/>
    </linearGradient>
    <linearGradient id="weapon3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22322b"/>
      <stop offset="0.5" stop-color="#b6d86c"/>
      <stop offset="1" stop-color="#151b14"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <style>
      .title{font:900 36px/1.1 "Segoe UI",Arial,sans-serif;fill:#f2d88a;letter-spacing:.08em}
      .sub{font:600 18px/1.3 "Segoe UI",Arial,sans-serif;fill:#9aa7b8}
      .h{font:900 22px/1.2 "Segoe UI",Arial,sans-serif;fill:#f4f0df;letter-spacing:.03em}
      .body{font:600 16px/1.35 "Segoe UI",Arial,sans-serif;fill:#b8c3d2}
      .small{font:800 12px/1 "Segoe UI",Arial,sans-serif;fill:#cdd6e5}
      .tiny{font:900 10px/1 "Segoe UI",Arial,sans-serif;fill:#0b0e12}
      .label{font:900 13px/1 "Segoe UI",Arial,sans-serif;fill:#101318}
      .panel{fill:url(#panel);stroke:#2a3444;stroke-width:1.5;filter:url(#soft)}
      .gridline{stroke:#253040;stroke-width:1}
      .tile{fill:#111821;stroke:#2e3948;stroke-width:2}
      .owned{stroke:#31e58e}
      .partial{stroke:#f3bd4f}
      .missing{stroke:#f06e7b}
      .gold{fill:#d8b15b}
      .green{fill:#52e39c}
      .red{fill:#f06e7b}
      .muted{fill:#748093}
      .blue{fill:#66b7ff}
      .purple{fill:#b49cff}
      .chip{fill:#111722;stroke:#344256;stroke-width:1}
      .dot{stroke:#0b0e12;stroke-width:1}
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>
  <path d="M0 86 H1800 M0 184 H1800 M0 282 H1800 M0 380 H1800 M0 478 H1800 M0 576 H1800 M0 674 H1800 M0 772 H1800 M0 870 H1800 M0 968 H1800" class="gridline" opacity=".22"/>
  <path d="M130 0 V1120 M310 0 V1120 M490 0 V1120 M670 0 V1120 M850 0 V1120 M1030 0 V1120 M1210 0 V1120 M1390 0 V1120 M1570 0 V1120" class="gridline" opacity=".16"/>

  <text x="70" y="70" class="title">D2 Collections - Simple Mode Layout Directions</text>
  <text x="70" y="106" class="sub">Mockups for denser DIM-style browsing without hiding ownership, catalyst/done state, damage type, priority, and multi-unlock progress.</text>

  <!-- Option A -->
  <g transform="translate(70 155)">
    <rect class="panel" width="800" height="390" rx="14"/>
    <text x="26" y="42" class="h">A. Refined Current Tile</text>
    <text x="26" y="70" class="body">Best low-risk pivot. Keep the current grid, but reserve fixed zones: top icons, centered item art, bottom state rail, side unlock badge.</text>
    <g transform="translate(28 110)">
      <rect x="0" y="0" width="118" height="150" rx="8" class="tile owned"/>
      <rect x="8" y="8" width="102" height="102" rx="5" fill="url(#exotic)"/>
      <rect x="14" y="14" width="90" height="90" rx="4" fill="url(#weapon1)" opacity=".96"/>
      <path d="M35 77 C48 28 80 31 90 58 C64 49 53 70 67 91 C53 92 42 87 35 77Z" fill="#102130" opacity=".78"/>
      <circle cx="22" cy="22" r="9" class="blue"/>
      <rect x="82" y="12" width="22" height="18" rx="4" class="chip"/>
      <text x="93" y="25" class="small" text-anchor="middle">⚑</text>
      <rect x="73" y="109" width="36" height="17" rx="4" fill="#f3bd4f"/>
      <text x="91" y="121" class="tiny" text-anchor="middle">1/3</text>
      <g transform="translate(19 132)">
        <circle cx="0" cy="0" r="5" class="dot green"/>
        <circle cx="16" cy="0" r="5" class="dot green"/>
        <circle cx="32" cy="0" r="5" class="dot muted"/>
      </g>
    </g>
    <g transform="translate(175 110)">
      <rect x="0" y="0" width="118" height="150" rx="8" class="tile partial"/>
      <rect x="8" y="8" width="102" height="102" rx="5" fill="url(#exotic)"/>
      <rect x="14" y="14" width="90" height="90" rx="4" fill="url(#weapon2)" opacity=".96"/>
      <path d="M33 38 L88 68 L43 91 L58 60 Z" fill="#e9e7f6" opacity=".45"/>
      <circle cx="22" cy="22" r="9" class="green"/>
      <rect x="77" y="109" width="32" height="17" rx="4" fill="#31e58e"/>
      <text x="93" y="121" class="tiny" text-anchor="middle">2/2</text>
      <g transform="translate(19 132)">
        <circle cx="0" cy="0" r="5" class="dot green"/>
        <circle cx="16" cy="0" r="5" class="dot muted"/>
        <circle cx="32" cy="0" r="5" class="dot muted"/>
      </g>
    </g>
    <g transform="translate(322 110)">
      <rect x="0" y="0" width="118" height="150" rx="8" class="tile missing"/>
      <rect x="8" y="8" width="102" height="102" rx="5" fill="url(#exotic)"/>
      <rect x="14" y="14" width="90" height="90" rx="4" fill="url(#weapon3)" opacity=".9"/>
      <path d="M28 80 L67 24 L92 88 Z" fill="#161c23" opacity=".65"/>
      <circle cx="22" cy="22" r="9" class="red"/>
      <g transform="translate(34 132)">
        <circle cx="0" cy="0" r="5" class="dot red"/>
        <circle cx="16" cy="0" r="5" class="dot muted"/>
        <circle cx="32" cy="0" r="5" class="dot muted"/>
      </g>
    </g>
    <g transform="translate(505 116)">
      <text x="0" y="0" class="small" fill="#f2d88a">Readable zones</text>
      <text x="0" y="28" class="body">• Damage icon: top-left</text>
      <text x="0" y="54" class="body">• Priority icons: top-right</text>
      <text x="0" y="80" class="body">• Own / Cat / Done: bottom dots</text>
      <text x="0" y="106" class="body">• Multi-unlocks: small count badge</text>
      <text x="0" y="150" class="body" fill="#52e39c">Recommended short-term.</text>
    </g>
  </g>

  <!-- Option B -->
  <g transform="translate(930 155)">
    <rect class="panel" width="800" height="390" rx="14"/>
    <text x="26" y="42" class="h">B. DIM Shelf Tile</text>
    <text x="26" y="70" class="body">More DIM-like. The item stays square; all readable metadata moves to a fixed shelf below. Slightly taller, much cleaner.</text>
    <g transform="translate(28 115)">
      <rect x="0" y="0" width="112" height="164" rx="6" fill="#0b0f16" stroke="#31e58e" stroke-width="2"/>
      <rect x="6" y="6" width="100" height="100" rx="3" fill="url(#exotic)"/>
      <rect x="12" y="12" width="88" height="88" rx="2" fill="url(#weapon1)"/>
      <rect x="6" y="108" width="100" height="50" rx="3" fill="#131a24"/>
      <circle cx="20" cy="122" r="6" class="dot green"/>
      <circle cx="38" cy="122" r="6" class="dot green"/>
      <circle cx="56" cy="122" r="6" class="dot muted"/>
      <rect x="68" y="114" width="30" height="17" rx="4" fill="#f3bd4f"/>
      <text x="83" y="126" class="tiny" text-anchor="middle">1/3</text>
      <circle cx="20" cy="145" r="8" class="blue"/>
      <text x="46" y="149" class="small">⚑ ✦</text>
    </g>
    <g transform="translate(164 115)">
      <rect x="0" y="0" width="112" height="164" rx="6" fill="#0b0f16" stroke="#f3bd4f" stroke-width="2"/>
      <rect x="6" y="6" width="100" height="100" rx="3" fill="url(#exotic)"/>
      <rect x="12" y="12" width="88" height="88" rx="2" fill="url(#weapon2)"/>
      <rect x="6" y="108" width="100" height="50" rx="3" fill="#131a24"/>
      <circle cx="20" cy="122" r="6" class="dot green"/>
      <circle cx="38" cy="122" r="6" class="dot muted"/>
      <circle cx="56" cy="122" r="6" class="dot muted"/>
      <circle cx="20" cy="145" r="8" class="green"/>
      <text x="46" y="149" class="small">◆</text>
    </g>
    <g transform="translate(300 115)">
      <rect x="0" y="0" width="112" height="164" rx="6" fill="#0b0f16" stroke="#f06e7b" stroke-width="2"/>
      <rect x="6" y="6" width="100" height="100" rx="3" fill="url(#exotic)"/>
      <rect x="12" y="12" width="88" height="88" rx="2" fill="url(#weapon3)"/>
      <rect x="6" y="108" width="100" height="50" rx="3" fill="#131a24"/>
      <circle cx="20" cy="122" r="6" class="dot red"/>
      <circle cx="38" cy="122" r="6" class="dot muted"/>
      <circle cx="56" cy="122" r="6" class="dot muted"/>
      <circle cx="20" cy="145" r="8" class="red"/>
    </g>
    <g transform="translate(480 116)">
      <text x="0" y="0" class="small" fill="#f2d88a">Tradeoff</text>
      <text x="0" y="28" class="body">• More legible than current tile</text>
      <text x="0" y="54" class="body">• Still highly scannable</text>
      <text x="0" y="80" class="body">• Costs about +14px height per tile</text>
      <text x="0" y="124" class="body" fill="#66b7ff">Best overall polish option.</text>
    </g>
  </g>

  <!-- Option C -->
  <g transform="translate(70 600)">
    <rect class="panel" width="800" height="390" rx="14"/>
    <text x="26" y="42" class="h">C. Compact List Strip</text>
    <text x="26" y="70" class="body">Not as pretty, but strongest for information density. Great if search/filtering is the main workflow.</text>
    <g transform="translate(28 118)">
      <rect width="715" height="54" rx="7" fill="#101720" stroke="#31e58e"/>
      <rect x="8" y="7" width="40" height="40" rx="3" fill="url(#weapon1)"/>
      <text x="62" y="24" class="small" fill="#f4f0df">Barrow-Dyad</text>
      <text x="62" y="43" class="small" fill="#8fa0b5">Kinetic • SMG • Strand</text>
      <circle cx="290" cy="27" r="7" class="dot green"/>
      <circle cx="312" cy="27" r="7" class="dot green"/>
      <circle cx="334" cy="27" r="7" class="dot muted"/>
      <rect x="365" y="17" width="44" height="21" rx="5" fill="#f3bd4f"/>
      <text x="387" y="31" class="label" text-anchor="middle">1/3</text>
      <text x="440" y="32" class="small">⚑ Must   ◆ Easy   ✦ Final</text>
    </g>
    <g transform="translate(28 186)">
      <rect width="715" height="54" rx="7" fill="#101720" stroke="#f3bd4f"/>
      <rect x="8" y="7" width="40" height="40" rx="3" fill="url(#weapon2)"/>
      <text x="62" y="24" class="small" fill="#f4f0df">Praxic Blade</text>
      <text x="62" y="43" class="small" fill="#8fa0b5">Power • Sword • Solar</text>
      <circle cx="290" cy="27" r="7" class="dot green"/>
      <circle cx="312" cy="27" r="7" class="dot muted"/>
      <circle cx="334" cy="27" r="7" class="dot muted"/>
      <rect x="365" y="17" width="44" height="21" rx="5" fill="#f3bd4f"/>
      <text x="387" y="31" class="label" text-anchor="middle">2/5</text>
      <text x="440" y="32" class="small">◆ Easy   ◎ Xur?</text>
    </g>
    <g transform="translate(28 254)">
      <rect width="715" height="54" rx="7" fill="#101720" stroke="#f06e7b"/>
      <rect x="8" y="7" width="40" height="40" rx="3" fill="url(#weapon3)"/>
      <text x="62" y="24" class="small" fill="#f4f0df">Cull's Shadow</text>
      <text x="62" y="43" class="small" fill="#8fa0b5">Kinetic • Fusion Rifle</text>
      <circle cx="290" cy="27" r="7" class="dot red"/>
      <circle cx="312" cy="27" r="7" class="dot muted"/>
      <circle cx="334" cy="27" r="7" class="dot muted"/>
      <rect x="365" y="17" width="44" height="21" rx="5" fill="#f06e7b"/>
      <text x="387" y="31" class="label" text-anchor="middle">0/2</text>
      <text x="440" y="32" class="small">⚑ Must</text>
    </g>
  </g>

  <!-- Option D -->
  <g transform="translate(930 600)">
    <rect class="panel" width="800" height="390" rx="14"/>
    <text x="26" y="42" class="h">D. Director Node Tile</text>
    <text x="26" y="70" class="body">Most Destiny-themed. Bigger tile with a destination-node feel: icon, color strip, and state bars. Lower density but premium.</text>
    <g transform="translate(30 116)">
      <rect x="0" y="0" width="156" height="178" rx="10" fill="#0e141d" stroke="#31e58e" stroke-width="2"/>
      <rect x="0" y="0" width="156" height="5" rx="2" fill="#31e58e"/>
      <rect x="18" y="18" width="120" height="92" rx="5" fill="url(#weapon1)"/>
      <text x="18" y="132" class="small" fill="#f4f0df">Barrow-Dyad</text>
      <rect x="18" y="145" width="42" height="18" rx="4" fill="#52e39c"/>
      <text x="39" y="158" class="tiny" text-anchor="middle">OWN</text>
      <rect x="66" y="145" width="42" height="18" rx="4" fill="#f3bd4f"/>
      <text x="87" y="158" class="tiny" text-anchor="middle">1/3</text>
      <circle cx="129" cy="154" r="8" class="blue"/>
    </g>
    <g transform="translate(210 116)">
      <rect x="0" y="0" width="156" height="178" rx="10" fill="#0e141d" stroke="#f3bd4f" stroke-width="2"/>
      <rect x="0" y="0" width="156" height="5" rx="2" fill="#f3bd4f"/>
      <rect x="18" y="18" width="120" height="92" rx="5" fill="url(#weapon2)"/>
      <text x="18" y="132" class="small" fill="#f4f0df">Praxic Blade</text>
      <rect x="18" y="145" width="42" height="18" rx="4" fill="#52e39c"/>
      <text x="39" y="158" class="tiny" text-anchor="middle">OWN</text>
      <rect x="66" y="145" width="42" height="18" rx="4" fill="#f3bd4f"/>
      <text x="87" y="158" class="tiny" text-anchor="middle">2/5</text>
      <circle cx="129" cy="154" r="8" class="green"/>
    </g>
    <g transform="translate(430 116)">
      <text x="0" y="0" class="small" fill="#f2d88a">Tradeoff</text>
      <text x="0" y="28" class="body">• Strongest Destiny vibe</text>
      <text x="0" y="54" class="body">• Easier on eyes, less spreadsheet-like</text>
      <text x="0" y="80" class="body">• Fewer items per screen</text>
      <text x="0" y="124" class="body" fill="#f3bd4f">Best if visual feel matters more than max density.</text>
    </g>
  </g>
</svg>
