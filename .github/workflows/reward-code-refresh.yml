name: Refresh Reward Codes

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reward-code-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check trusted catalog for new codes
        run: node tools/sync-reward-codes.mjs
      - name: Detect catalog changes
        id: catalog
        shell: bash
        run: |
          if git diff --quiet -- apps/web/src/rewardCodesCatalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: pnpm/action-setup@v4
        if: steps.catalog.outputs.changed == 'true'
        with:
          version: 11.7.0
      - uses: actions/setup-python@v5
        if: steps.catalog.outputs.changed == 'true'
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: steps.catalog.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Resolve new rewards against the Bungie manifest
        if: steps.catalog.outputs.changed == 'true'
        run: python tools/sync-manifest.py --reward-codes-only
      - name: Validate catalog and site
        if: steps.catalog.outputs.changed == 'true'
        run: pnpm lint && pnpm test && pnpm --filter @guardian-nexus/web build
      - name: Commit verified catalog update
        if: steps.catalog.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/rewardCodesCatalog.json apps/web/public/data/reward-code-manifest.json
          git commit -m "chore: refresh reward code catalog"
          git pull --rebase origin main
          git push origin HEAD:main
