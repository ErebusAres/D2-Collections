name: Manifest Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * 2"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check current Bungie manifest coverage
        run: node tools/audit-manifest-exotics.mjs
