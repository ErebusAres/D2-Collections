name = "guardian-nexus-api"
main = "src/index.ts"
compatibility_date = "2026-07-14"
workers_dev = true
preview_urls = true

[triggers]
crons = ["17 */6 * * *"]

[vars]
BUNGIE_CLIENT_ID = "53180"
ALLOWED_ORIGIN = "http://localhost:5173"
WEB_ORIGIN = "http://localhost:5173"
GAME_DATA_URL = "http://localhost:5173/data/manifest.json"
DEV_MEMBERSHIP_IDS = "4611686018470688010,4611686018470677739,4611686018470990353"
MATRIX_MEMBERSHIP_IDS = "4611686018470688010,4611686018470677739,4611686018470990353"

[[d1_databases]]
binding = "DB"
database_name = "guardian-nexus-v1"
database_id = "replace-with-new-d1-database-id"
migrations_dir = "migrations"
