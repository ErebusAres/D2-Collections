<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 150" role="img" aria-labelledby="title desc">
  <title id="title">D2 Exotic Collections</title>
  <desc id="desc">Destiny inspired exotic collection title with an inventory tile, engram core, and director lines.</desc>
  <defs>
    <linearGradient id="exoticGold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fff0ad"/>
      <stop offset=".42" stop-color="#d8b15b"/>
      <stop offset="1" stop-color="#7d5b22"/>
    </linearGradient>
    <linearGradient id="tileGold" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#d9b246"/>
      <stop offset=".5" stop-color="#9b7a28"/>
      <stop offset="1" stop-color="#3b321a"/>
    </linearGradient>
    <linearGradient id="textGold" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#fff0ad"/>
      <stop offset=".45" stop-color="#d8b15b"/>
      <stop offset="1" stop-color="#f0d587"/>
    </linearGradient>
    <linearGradient id="directorBlue" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#9cc7ff"/>
      <stop offset=".58" stop-color="#6fa8dc"/>
      <stop offset="1" stop-color="#58d69a"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-30%" width="116%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="760" height="150" fill="#07090d" opacity=".01"/>

  <g filter="url(#shadow)">
    <rect x="21" y="20" width="108" height="108" rx="8" fill="#090c12" stroke="#2f3540" stroke-width="2"/>
    <rect x="27" y="26" width="96" height="96" rx="5" fill="url(#tileGold)" stroke="url(#exoticGold)" stroke-width="2"/>
    <path d="M27 26h96v20H27z" fill="#d8b15b" opacity=".28"/>
    <path d="M27 101h96v21H27z" fill="#090c12" opacity=".55"/>
    <path d="M36 110h44" stroke="#f0d587" stroke-width="3" stroke-linecap="round" opacity=".86"/>
    <text x="91" y="116" fill="#f3f5f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="900" letter-spacing=".5">D2</text>

    <g transform="translate(75 70)" filter="url(#glow)">
      <path d="M0-35 30-18 30 18 0 35-30 18-30-18Z" fill="#10151e" stroke="#fff0ad" stroke-width="2.5"/>
      <path d="M0-25 21-12 21 12 0 25-21 12-21-12Z" fill="#d8b15b" opacity=".95"/>
      <path d="M0-25v50M-21-12 21 12M21-12-21 12" stroke="#fff0ad" stroke-width="1.8" opacity=".65"/>
      <path d="M0-12 10-6 10 6 0 12-10 6-10-6Z" fill="#07090d"/>
    </g>

    <path d="M75 13a57 57 0 1 0 0 114 57 57 0 1 0 0-114Z" fill="none" stroke="#9cc7ff" stroke-width="1.2" stroke-dasharray="3 7" opacity=".34"/>
    <path d="M75 9v11M75 130v11M9 75h11M130 75h11" stroke="url(#directorBlue)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="75" cy="9" r="3.5" fill="#9cc7ff"/>
    <circle cx="75" cy="141" r="3.5" fill="#58d69a"/>
    <circle cx="9" cy="75" r="3.5" fill="#d8b15b"/>
    <circle cx="141" cy="75" r="3.5" fill="#d8b15b"/>
  </g>

  <g filter="url(#shadow)">
    <text x="160" y="33" fill="#9cc7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900" letter-spacing="3.2">DIRECTOR // EXOTIC VAULT</text>
    <text x="160" y="78" fill="#f3f5f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="48" font-weight="900" letter-spacing="1.2">D2 EXOTIC</text>
    <text x="160" y="119" fill="url(#textGold)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="900" letter-spacing=".8">COLLECTIONS</text>

    <path d="M160 132h274" stroke="url(#directorBlue)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M452 132h42l12-12h86" stroke="#d8b15b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M611 120h80" stroke="#cad1dd" stroke-width="1.2" stroke-dasharray="5 6" opacity=".5"/>
    <path d="M709 119 725 132 709 145" fill="none" stroke="#d8b15b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(626 55)" opacity=".9">
      <path d="M0 0h25M42 0h42M25 0l9-9h8M25 0l9 9h8" stroke="#9cc7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="3" fill="#9cc7ff"/>
      <circle cx="84" cy="0" r="3" fill="#58d69a"/>
      <path d="M42-13 55 0 42 13 29 0Z" fill="none" stroke="#d8b15b" stroke-width="2"/>
    </g>
  </g>
</svg>
